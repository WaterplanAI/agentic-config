plugin_id: ac-safety
claude_plugin_path: plugins/ac-safety
pi_package: '@agentic-config/pi-ac-safety'
pi_package_path: packages/pi-ac-safety
shared_assets:
- asset_id: shared-package-files
  source: assets
  outputs:
    claude: .
    pi: assets
placeholder_values:
  PACKAGE_ASSETS:
    claude: ${CLAUDE_PLUGIN_ROOT}
    pi: ../../assets
  SPEC_ROOT:
    claude: specs
    pi: .specs/specs
runtime_attachments:
- attachment_id: hook-compat
  harness: pi
  kind: hook-compat
  output_path: extensions/hook-compat.js
  package_entry: ./extensions/hook-compat.js
  plugin_root_mode: package-assets
  dependency_refs:
  - '@agentic-config/pi-compat'
  ask_fallback:
    nonInteractive: deny
  hooks:
  - matcher: Read|Grep|Glob
    hooks:
    - id: credential-guardian
      script_path: scripts/hooks/credential-guardian.py
      timeout_ms: 5000
      failure_mode: fail-close
  - matcher: Bash
    hooks:
    - id: destructive-bash-guardian
      script_path: scripts/hooks/destructive-bash-guardian.py
      timeout_ms: 5000
      failure_mode: fail-close
    - id: supply-chain-guardian
      script_path: scripts/hooks/supply-chain-guardian.py
      timeout_ms: 5000
      failure_mode: fail-close
    - id: playwright-guardian
      script_path: scripts/hooks/playwright-guardian.py
      timeout_ms: 5000
      failure_mode: fail-close
  - matcher: Write|Edit|NotebookEdit
    hooks:
    - id: write-scope-guardian
      script_path: scripts/hooks/write-scope-guardian.py
      timeout_ms: 5000
      failure_mode: fail-close
dependencies:
  pi:
    package_dependencies:
    - '@agentic-config/pi-compat'
    bundled_dependencies:
    - '@agentic-config/pi-compat'
    extension_exports:
    - node_modules/@agentic-config/pi-compat/extensions

# .gcp-setup.yml — Project-level GCP infrastructure config
# Generated by the gcp-setup skill. Place in project root.
#
# MULTI-APP: Multiple apps can share the same GCP project IDs.
# Each app repo gets its own .gcp-setup.yml. Shared resources
# (AR repo, KMS, GitHub connection) are created idempotently.
#
# MUST be unique per app (within the same GCP project):
#   - projects.*.service_name    (Cloud Run service name)
#   - sa_prefix.runtime          (runtime service account)
#   - sa_prefix.cloudbuild       (build service account)
#   - secrets[].name             (Secret Manager secret names)
#
# See cookbook/environments.md for full multi-app guidance.
version: 1

projects:
  stage:
    id: "example-app-stage"
    service_name: "example-app-stage"
    build_config: "cloudbuild-stage.yaml"
  prod:
    id: "example-app-prod"
    service_name: "example-app"
    build_config: "cloudbuild-prod.yaml"

region: us-central1

artifact_registry:
  repo_name: "docker-images"

sa_prefix:
  runtime: "app-runtime"       # CHANGE: use app-specific prefix (e.g., "myapp-runtime") for multi-app projects
  cloudbuild: "app-cloudbuild"  # CHANGE: use app-specific prefix (e.g., "myapp-cloudbuild") for multi-app projects

kms:
  keyring: "cloudbuild-keys"
  key: "connection-key"

github:
  connection_name: "example-app"
  linked_repo: "ExampleOrg-example-app"
  repo_slug: "ExampleOrg/example-app"

# Config-driven secret manifest (replaces hardcoded lists)
# Each secret: name (in Secret Manager), env_var (injected into Cloud Run),
# source (documentation), auto_generate + generator (optional)
secrets:
  - name: oauth-client-id
    env_var: GOOGLE_CLIENT_ID
    source: "GCP OAuth 2.0 Client ID"
  - name: oauth-client-secret
    env_var: GOOGLE_CLIENT_SECRET
    source: "GCP OAuth 2.0 Client Secret"
  - name: session-secret
    env_var: SESSION_SECRET
    auto_generate: true
    generator: "openssl rand -hex 32"
    source: "Auto-generated session signing key"

health_endpoint: /api/health
health_response: '"status":"healthy"'

oauth:
  enabled: false
  # Fields below are ignored when enabled is false. They serve as
  # documentation defaults — uncomment and set when enabling OAuth.
  mode: standalone              # standalone | auth-proxy | iap (recommended for internal tools)
  domain_restriction: ""        # e.g., "example.com" — leave empty to skip domain check
  callback_path: /auth/google/cb       # Express+Passport; use /api/auth/callback/google for Auth.js — register BOTH in OAuth client
  consent_type: Internal        # Internal (org-only) or External

# Optional infrastructure modules
firestore:
  enabled: false
  collection: express-sessions
  ttl_field: expiresAt

app:
  runtime: ""                   # e.g., "nodejs", "python", "go"
  framework: ""                 # e.g., "express", "fastapi", "gin"
  dockerfile_path: ""           # e.g., "Dockerfile" or "src/Dockerfile"
  image_name: ""                # defaults to service_name if empty
  max_instances_stage: 5        # Cloud Run max instances for stage
  max_instances_prod: 100       # Cloud Run max instances for prod
